<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F5F4">
<title>ボーナスカウントダウン - 夏/冬ボーナスまであと何日</title>
<meta name="description" content="夏/冬ボーナスまでの残り日数と、想定入金額・秒単位の積立相当を表示。">
<meta property="og:title" content="ボーナスカウントダウン">
<meta property="og:description" content="ボーナスまであと何日？">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F5F4; --surface: #FFFFFF; --surface-2: #EFEEEC; --surface-3: #E7E5E4;
  --border: #D6D3D1; --border-strong: #A8A29E;
  --text: #0A0A0A; --text-2: #262626; --dim: #57534E; --dim-2: #78716C;
  --primary: #0A0A0A; --accent: #0A0A0A;
  --success: #047857; --danger: #B91C1C; --warning: #B45309;
  --radius-sm: 4px; --radius: 6px; --radius-lg: 10px;
  --shadow-sm: 0 1px 0 rgba(10,10,10,0.04);
  --shadow: 0 1px 2px rgba(10,10,10,0.04);
  --shadow-lg: 0 8px 24px -8px rgba(10,10,10,0.12);
  --duration: 160ms; --ease: cubic-bezier(0.2, 0, 0, 1);
  --font-sans: "Inter", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-num: "JetBrains Mono", "Inter", ui-monospace, SFMono-Regular, Menlo, monospace;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --tap: 48px; --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="dark"] {
  --bg: #0A0A0A; --surface: #141414; --surface-2: #1A1A1A; --surface-3: #222222;
  --border: #2A2A2A; --border-strong: #3F3F3F;
  --text: #FAFAFA; --text-2: #E5E5E5; --dim: #A3A3A3; --dim-2: #737373;
  --primary: #FAFAFA; --accent: #FAFAFA;
  --success: #34D399; --danger: #F87171; --warning: #FBBF24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
html, body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-sans); font-size: 15px; line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "cv11", "ss01", "ss03";
  letter-spacing: -0.005em; overscroll-behavior-y: none;
}
body { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column;
  padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
button { font-family: inherit; font-size: inherit; cursor: pointer; background: none; border: none; color: inherit; }
input, select { font-family: inherit; font-size: inherit; color: inherit; }
.tnum { font-variant-numeric: tabular-nums; }

.app {
  flex: 1; display: flex; flex-direction: column;
  max-width: 540px; width: 100%; margin: 0 auto;
  padding: clamp(12px, 4vw, 20px) clamp(16px, 5vw, 28px) 48px;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 0 clamp(24px, 6vw, 40px);
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 13px; color: var(--text); }
.brand-mark {
  width: 28px; height: 28px; border-radius: var(--radius-sm);
  background: var(--text); color: var(--bg);
  display: grid; place-items: center;
  font-size: 13px; font-weight: 700; font-family: var(--font-num);
}
.brand-meta {
  font-family: var(--font-mono); font-size: 11px; color: var(--dim);
  text-transform: uppercase; letter-spacing: 0.06em; margin-left: 2px;
}
.icon-btn {
  width: var(--tap); height: var(--tap); display: grid; place-items: center;
  border-radius: var(--radius); color: var(--dim);
  transition: background var(--duration) var(--ease);
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); }
.icon-btn svg { width: 18px; height: 18px; }

.hero { margin-bottom: clamp(28px, 7vw, 40px); }
.hero-eyebrow {
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--dim);
  margin-bottom: 14px; display: inline-flex; align-items: center; gap: 8px;
}
.hero-eyebrow::before { content: ""; width: 18px; height: 1px; background: var(--border-strong); }
.hero h1 {
  font-size: clamp(28px, 7.5vw, 36px); font-weight: 800;
  letter-spacing: -0.035em; line-height: 1.05; margin-bottom: 12px; color: var(--text);
}
.hero p { font-size: clamp(14px, 3.8vw, 15px); color: var(--dim); max-width: 42ch; line-height: 1.6; }

.field { margin-bottom: 18px; }
.field-label {
  display: flex; align-items: baseline; justify-content: space-between;
  font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--dim);
  margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em;
}
.field-hint { font-family: var(--font-mono); font-size: 11px; color: var(--dim-2); margin-top: 8px; }

.season-tabs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px;
}
.tab {
  min-height: 48px; padding: 0 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: flex-start; justify-content: center; gap: 2px;
  -webkit-tap-highlight-color: transparent;
  transition: border-color var(--duration) var(--ease);
}
.tab:hover { border-color: var(--border-strong); }
.tab[aria-pressed="true"] { border-color: var(--text); box-shadow: inset 0 0 0 1px var(--text); }
.tab-title { font-family: var(--font-mono); font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.tab-val { font-family: var(--font-num); font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }

.input-wrap {
  position: relative; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); transition: border-color var(--duration) var(--ease);
}
.input-wrap:focus-within { border-color: var(--text); }
.input-wrap .prefix {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--dim); font-family: var(--font-num); font-weight: 500; pointer-events: none;
}
.input-wrap input {
  width: 100%; height: var(--tap); padding: 0 14px 0 32px;
  border: none; background: transparent; outline: none;
  font-size: 16px; font-weight: 600;
  font-family: var(--font-num); font-variant-numeric: tabular-nums;
}
.date-input {
  width: 100%; height: var(--tap);
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); padding: 0 14px;
  font-family: var(--font-num); font-size: 16px; font-weight: 600;
  font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
  outline: none; transition: border-color var(--duration) var(--ease);
  color: var(--text); color-scheme: light dark;
}
.date-input:focus { border-color: var(--text); }

.big-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: clamp(40px, 10vw, 56px) clamp(20px, 6vw, 32px) clamp(32px, 8vw, 44px);
  text-align: center; margin-bottom: 16px;
  position: relative; overflow: hidden;
}
.big-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--success), transparent); opacity: 0.5;
}
.big-eyebrow {
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.14em; color: var(--success);
  margin-bottom: 14px;
}
.big-days {
  font-family: var(--font-num);
  font-size: clamp(56px, 18vw, 80px);
  font-weight: 800; letter-spacing: -0.05em; line-height: 0.95;
  font-variant-numeric: tabular-nums; margin-bottom: 6px; color: var(--text);
}
.big-days .unit { font-size: 0.36em; font-weight: 500; color: var(--dim); margin-left: 0.12em; letter-spacing: 0; }
.big-time {
  font-family: var(--font-num); font-size: clamp(18px, 5vw, 22px);
  font-weight: 600; letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums; color: var(--text-2); margin-bottom: 18px;
}
.big-time .sep { color: var(--dim); margin: 0 0.2em; }

.big-amount {
  font-family: var(--font-num); font-size: clamp(24px, 6.5vw, 32px);
  font-weight: 700; letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums; color: var(--text); margin-bottom: 8px;
}
.big-amount .yen {
  font-size: 0.5em; font-weight: 400; color: var(--dim);
  margin-right: 0.12em; vertical-align: 0.22em; letter-spacing: 0;
}
.big-sub {
  font-family: var(--font-mono); font-size: 11px; color: var(--dim);
  letter-spacing: 0.08em; text-transform: uppercase;
}

.accrual-wrap {
  margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border);
}
.accrual-label {
  font-family: var(--font-mono); font-size: 10px; color: var(--dim);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
}
.accrual-val {
  font-family: var(--font-num); font-size: 22px; font-weight: 700;
  color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
}
.accrual-val .yen-s { font-size: 12px; color: var(--dim); margin-right: 2px; font-family: var(--font-mono); font-weight: 400; }

.stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 16px;
}
.stat {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px;
}
.stat-label {
  font-family: var(--font-mono); font-size: 9px; color: var(--dim);
  margin-bottom: 6px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.stat-val {
  font-family: var(--font-num); font-size: 16px; font-weight: 700;
  font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--text);
}
.stat-val .yen-s { font-size: 11px; color: var(--dim); margin-right: 1px; font-family: var(--font-mono); font-weight: 400; }
.stat-val .unit { font-size: 11px; color: var(--dim); margin-left: 2px; font-weight: 500; }

.btn {
  width: 100%; min-height: 52px; padding: 0 20px;
  border-radius: var(--radius); font-size: 15px; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  transition: background var(--duration) var(--ease), border-color var(--duration) var(--ease), transform 80ms var(--ease);
  user-select: none; -webkit-tap-highlight-color: transparent;
  font-family: var(--font-sans);
}
.btn:active { transform: scale(0.985); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface-2); border-color: var(--border-strong); }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.footer {
  margin-top: auto; padding-top: 40px;
  font-family: var(--font-mono); font-size: 10px; color: var(--dim-2);
  text-align: center; text-transform: uppercase; letter-spacing: 0.1em;
}
.footer a { color: var(--dim); text-decoration: none; }

.toast {
  position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text); color: var(--bg);
  padding: 12px 18px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg);
  opacity: 0; transition: opacity 220ms var(--ease), transform 220ms var(--ease);
  z-index: 100; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 768px) { .app { max-width: 100%; } }
@media (max-width: 480px) {
  :root { --tap: 52px; }
  body { font-size: 14px; }
  .app { padding: 12px 16px 40px; }
  .hero h1 { font-size: clamp(24px, 8vw, 30px); }
  .big-card { padding: 32px 18px 30px; }
  .big-days { font-size: clamp(52px, 17vw, 70px); }
  .stats-grid { gap: 6px; }
  .btn { min-height: 54px; font-size: 14.5px; padding: 0 16px; }
  .footer { padding-top: 32px; font-size: 9px; }
}
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; } }
@media (hover: none) {
  .btn-secondary:hover { background: var(--surface); border-color: var(--border); }
  .tab:hover { border-color: var(--border); }
  .icon-btn:hover { background: transparent; color: var(--dim); }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">¥</div>
      <span>Bonus</span>
      <span class="brand-meta">v1.0</span>
    </div>
    <button class="icon-btn" id="themeToggle" aria-label="テーマ切替">
      <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <div class="hero">
    <div class="hero-eyebrow">Next Payday · Real-time</div>
    <h1>ボーナスまで、<br>あと何日？</h1>
    <p>夏/冬ボーナス日と想定額を設定すると、残り日数・時分秒・1日あたり積立相当を表示します。</p>
  </div>

  <div class="field">
    <label class="field-label"><span>ボーナスのタイプ</span></label>
    <div class="season-tabs">
      <button type="button" class="tab season-tab" data-season="summer" aria-pressed="true">
        <span class="tab-title">夏</span>
        <span class="tab-val">6月下旬〜7月上旬</span>
      </button>
      <button type="button" class="tab season-tab" data-season="winter">
        <span class="tab-title">冬</span>
        <span class="tab-val">12月上旬〜中旬</span>
      </button>
    </div>
  </div>

  <div class="field">
    <label class="field-label"><span>支給日</span></label>
    <input type="date" id="dateInput" class="date-input" aria-label="支給日">
  </div>

  <div class="field">
    <label class="field-label"><span>想定支給額</span></label>
    <div class="season-tabs amount-presets" style="margin-bottom:10px;">
      <button type="button" class="tab amt-preset" data-amt="200000">
        <span class="tab-title">新卒想定</span>
        <span class="tab-val">¥200,000</span>
      </button>
      <button type="button" class="tab amt-preset" data-amt="400000" aria-pressed="true">
        <span class="tab-title">一般想定</span>
        <span class="tab-val">¥400,000</span>
      </button>
      <button type="button" class="tab amt-preset" data-amt="700000">
        <span class="tab-title">中堅想定</span>
        <span class="tab-val">¥700,000</span>
      </button>
      <button type="button" class="tab amt-preset" data-amt="1200000">
        <span class="tab-title">管理職想定</span>
        <span class="tab-val">¥1,200,000</span>
      </button>
    </div>
    <div class="input-wrap">
      <span class="prefix">¥</span>
      <input type="number" id="amtInput" value="400000" min="0" max="99999999" inputmode="numeric" aria-label="カスタム支給額">
    </div>
    <p class="field-hint">手取り概算は支給額 × 0.8（目安）</p>
  </div>

  <div class="big-card">
    <div class="big-eyebrow" id="bigEyebrow">夏ボーナスまで</div>
    <div class="big-days tnum"><span id="daysVal">0</span><span class="unit">日</span></div>
    <div class="big-time tnum">
      <span id="hVal">00</span><span class="sep">:</span><span id="mVal">00</span><span class="sep">:</span><span id="sVal">00</span>
    </div>
    <div class="big-amount tnum"><span class="yen">¥</span><span id="amtVal">400,000</span></div>
    <div class="big-sub" id="amtSub">想定支給額 · 手取り概算 ¥320,000</div>
    <div class="accrual-wrap">
      <div class="accrual-label">1日あたり積立相当</div>
      <div class="accrual-val tnum"><span class="yen-s">¥</span><span id="perDayVal">0</span></div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat">
      <div class="stat-label">Weeks</div>
      <div class="stat-val tnum"><span id="weeksVal">0</span><span class="unit">週</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Weekdays</div>
      <div class="stat-val tnum"><span id="bdaysVal">0</span><span class="unit">日</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Per Hour</div>
      <div class="stat-val tnum"><span class="yen-s">¥</span><span id="perHrVal">0</span></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" id="shareBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      Xでシェア
    </button>
    <button class="btn btn-secondary" id="copyBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      コピー
    </button>
  </div>

  <footer class="footer">
    <a href="https://x.com/otsu_dev" target="_blank" rel="noopener">100 Web Apps Challenge · #22</a>
  </footer>
</div>

<div class="toast" id="toast">コピーしました</div>

<script>
(() => {
  'use strict';

  const pad = (n) => String(n).padStart(2, '0');
  const fmt = (n) => Math.floor(n).toLocaleString('ja-JP');
  const toKey = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const WD = ['日','月','火','水','木','金','土'];

  const state = {
    season: 'summer',
    dateStr: '',
    amt: 400000,
  };

  const $ = (id) => document.getElementById(id);
  const dateInput = $('dateInput');
  const amtInput = $('amtInput');
  const seasonTabs = document.querySelectorAll('.season-tab');
  const amtPresets = document.querySelectorAll('.amt-preset');
  const bigEyebrow = $('bigEyebrow');
  const daysVal = $('daysVal');
  const hVal = $('hVal'); const mVal = $('mVal'); const sVal = $('sVal');
  const amtVal = $('amtVal');
  const amtSub = $('amtSub');
  const perDayVal = $('perDayVal');
  const weeksVal = $('weeksVal');
  const bdaysVal = $('bdaysVal');
  const perHrVal = $('perHrVal');
  const toast = $('toast');

  const showToast = (msg) => {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  };

  // Theme
  const applyTheme = (t) => {
    document.documentElement.setAttribute('data-theme', t);
    $('iconSun').hidden = t === 'dark';
    $('iconMoon').hidden = t !== 'dark';
    document.querySelector('meta[name="theme-color"]').setAttribute('content', t === 'dark' ? '#0A0A0A' : '#F5F5F4');
  };
  const savedTheme = localStorage.getItem('bc-theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(savedTheme);
  $('themeToggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('bc-theme', next);
    applyTheme(next);
  });

  // Default date calc
  const defaultDateForSeason = (season) => {
    const now = new Date();
    const y = now.getFullYear();
    if (season === 'summer') {
      const target = new Date(y, 5, 30); // June 30
      if (target < now) target.setFullYear(y + 1);
      return target;
    } else {
      const target = new Date(y, 11, 10); // Dec 10
      if (target < now) target.setFullYear(y + 1);
      return target;
    }
  };

  // Season tabs
  seasonTabs.forEach(btn => {
    btn.addEventListener('click', () => {
      seasonTabs.forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      state.season = btn.dataset.season;
      const d = defaultDateForSeason(state.season);
      dateInput.value = toKey(d);
      state.dateStr = dateInput.value;
      saveSettings();
      update();
    });
  });

  dateInput.addEventListener('input', () => {
    state.dateStr = dateInput.value;
    saveSettings();
    update();
  });

  // Amount presets
  amtPresets.forEach(btn => {
    btn.addEventListener('click', () => {
      amtPresets.forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      amtInput.value = btn.dataset.amt;
      state.amt = Number(btn.dataset.amt);
      saveSettings();
      update();
    });
  });
  amtInput.addEventListener('input', () => {
    amtPresets.forEach(b => b.setAttribute('aria-pressed', 'false'));
    state.amt = Math.max(0, Number(amtInput.value) || 0);
    saveSettings();
    update();
  });

  // Restore
  const saved = (() => { try { return JSON.parse(localStorage.getItem('bc-settings') || '{}'); } catch { return {}; } })();
  if (saved.season) {
    state.season = saved.season;
    seasonTabs.forEach(b => b.setAttribute('aria-pressed', b.dataset.season === saved.season ? 'true' : 'false'));
  }
  if (saved.amt != null) {
    state.amt = saved.amt;
    amtInput.value = saved.amt;
    amtPresets.forEach(b => b.setAttribute('aria-pressed', String(b.dataset.amt) === String(saved.amt) ? 'true' : 'false'));
  }
  if (saved.dateStr) {
    state.dateStr = saved.dateStr;
    dateInput.value = saved.dateStr;
  } else {
    const d = defaultDateForSeason(state.season);
    dateInput.value = toKey(d);
    state.dateStr = dateInput.value;
  }

  function saveSettings() {
    try {
      localStorage.setItem('bc-settings', JSON.stringify({
        season: state.season,
        dateStr: state.dateStr,
        amt: state.amt,
      }));
    } catch {}
  }

  function update() {
    bigEyebrow.textContent = state.season === 'summer' ? '夏ボーナスまで' : '冬ボーナスまで';
    amtVal.textContent = fmt(state.amt);
    const takeHome = state.amt * 0.8;
    amtSub.textContent = `想定支給額 · 手取り概算 ¥${fmt(takeHome)}`;
  }

  function tick() {
    if (!state.dateStr) return;
    const now = new Date();
    const target = new Date(state.dateStr + 'T00:00:00');
    const diffMs = target - now;
    if (diffMs <= 0) {
      daysVal.textContent = '0';
      hVal.textContent = '00'; mVal.textContent = '00'; sVal.textContent = '00';
      perDayVal.textContent = fmt(state.amt);
      weeksVal.textContent = '0';
      bdaysVal.textContent = '0';
      perHrVal.textContent = fmt(state.amt);
      bigEyebrow.textContent = '今日が支給日です';
      return;
    }
    const s = Math.floor(diffMs / 1000);
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    daysVal.textContent = d;
    hVal.textContent = pad(h);
    mVal.textContent = pad(m);
    sVal.textContent = pad(sec);

    // Per-day accrual
    // 直前の支給日（半年前）を起点として積立と見立てる
    const prevCycleMs = 183 * 86400000; // 約半年
    const elapsedCycle = Math.max(1, prevCycleMs - diffMs);
    const perDay = state.amt / (prevCycleMs / 86400000);
    perDayVal.textContent = fmt(perDay);

    weeksVal.textContent = Math.floor(d / 7);
    // business days approx (weekdays)
    let biz = 0;
    for (let i = 0; i <= d; i++) {
      const dt = new Date(now.getFullYear(), now.getMonth(), now.getDate() + i);
      const dow = dt.getDay();
      if (dow !== 0 && dow !== 6) biz++;
    }
    bdaysVal.textContent = biz;
    // per business hour (仮に1日8h)
    perHrVal.textContent = fmt(state.amt / Math.max(1, biz * 8));

    bigEyebrow.textContent = state.season === 'summer' ? '夏ボーナスまで' : '冬ボーナスまで';
  }

  update();
  tick();
  setInterval(tick, 1000);

  // Share
  const buildShareText = () => {
    const now = new Date();
    const target = new Date(state.dateStr + 'T00:00:00');
    const diffMs = target - now;
    const d = Math.max(0, Math.floor(diffMs / 86400000));
    const seasonLabel = state.season === 'summer' ? '夏' : '冬';
    return `${seasonLabel}ボーナス（想定¥${fmt(state.amt)}）まであと${d}日。積立換算で1日あたり¥${fmt(state.amt / 183)}。\n\n#ボーナスカウントダウン`;
  };
  $('shareBtn').addEventListener('click', () => {
    const text = buildShareText();
    window.open(`https://x.com/intent/post?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.origin)}`, '_blank', 'noopener');
  });
  $('copyBtn').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(buildShareText() + '\n' + location.origin);
      showToast('コピーしました');
    } catch { showToast('コピー失敗'); }
  });
})();
</script>
</body>
</html>
